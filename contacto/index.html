<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | indicadores.cl</title>
  <meta name="description" content="Contacta al equipo de indicadores.cl — consultas, sugerencias y reportes de errores.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://indicadores.cl/contacto/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0e14'/><text y='22' x='6' font-size='18' font-family='monospace' fill='%233b9eff'>$</text></svg>">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    .contact-wrap { max-width: 520px; margin: 0 auto; padding: 48px 20px 80px; }
    .contact-wrap h1 { font-size: 28px; font-weight: 300; letter-spacing: -0.02em; margin-bottom: 8px; }
    .contact-wrap h1 strong { font-weight: 600; }
    .contact-wrap p { color: var(--text-2); font-size: 15px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; }
    textarea.input { min-height: 140px; resize: vertical; font-family: var(--font-body); font-size: 15px; }
    .form-note { font-size: 12px; color: var(--text-3); margin-top: 16px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="nav-logo"><span>$</span> indicadores.cl</a>
  </div>
</nav>

<div class="contact-wrap">
  <h1><strong>Contacto</strong></h1>
  <p>¿Encontraste un error en los datos? ¿Tienes una sugerencia de herramienta? Escríbenos.</p>

  <form id="contact-form" onsubmit="handleSubmit(event)">
    <div class="form-group">
      <label class="form-label" for="name">Tu nombre</label>
      <input class="input" type="text" id="name" name="name" placeholder="Ej: María González" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email de respuesta</label>
      <input class="input" type="email" id="email" name="email" placeholder="tu@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="msg">Mensaje</label>
      <textarea class="input" id="msg" name="message" placeholder="Cuéntanos..." required></textarea>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Enviar mensaje</button>
    <p class="form-note">Respondemos en 1–3 días hábiles. No compartimos tu email con terceros.</p>
  </form>

  <div id="success" style="display:none;text-align:center;padding:32px 0">
    <div style="font-size:32px;margin-bottom:12px">✓</div>
    <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px">Mensaje enviado</div>
    <div style="color:var(--text-2);font-size:14px">Te responderemos pronto. <a href="/">Volver al inicio →</a></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <span class="footer-copy">© 2026 indicadores.cl</span>
    <ul class="footer-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/privacidad/">Privacidad</a></li>
    </ul>
  </div>
</footer>

<script>
// Formulario sin backend — usar Formspree.io (gratis)
// 1. Ir a https://formspree.io → crear cuenta
// 2. Crear nuevo form → obtener endpoint como https://formspree.io/f/XXXXXXXX
// 3. Reemplazar el action del form con ese endpoint

async function handleSubmit(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  btn.textContent = 'Enviando…';
  btn.disabled = true;

  // REEMPLAZAR con tu endpoint de Formspree:
  const FORMSPREE = 'https://formspree.io/f/XXXXXXXX';

  try {
    const res = await fetch(FORMSPREE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('msg').value,
      })
    });
    if (res.ok) {
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } else {
      throw new Error();
    }
  } catch {
    btn.textContent = 'Error — intenta de nuevo';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
